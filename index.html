// ═══════════════════════════════════════════════
//  HUMANOID (Level 37) — fehér, arctalan, izmos férfitest
//  Ugyanazt az anim-interfészt adja (head/arm/body/legs grp), így az AI/animáció
//  ugyanúgy mozgatja, mint a bacteriát.
// ═══════════════════════════════════════════════
function createHumanoid() {
  const g = new THREE.Group();
  // teljesen fehér, halvány önfénnyel (a sötétebb térben is dereng); nyurga
  const skin = new THREE.MeshStandardMaterial({ color: 0xf3f0ea, roughness: 0.5, metalness: 0.0, emissive: 0x2b2b27, emissiveIntensity: 0.6 });
  const dark = new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.95, metalness: 0.0 });
  const ell  = (r, sx, sy, sz) => { const e = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 12), skin); e.scale.set(sx, sy, sz); return e; };
  const tcyl = (rt, rb, h) => new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, 14), skin);
  const cone = (r, h) => new THREE.Mesh(new THREE.ConeGeometry(r, h, 8), skin);

  // ── Törzs — nagyon vékony, lapos, nyúlánk ──
  const bodyGrp = new THREE.Group();
  bodyGrp.position.y = 1.12;                          // csípő-pivot (magasan → hosszú lábak)
  const pelvis = ell(0.145, 1.35, 1.05, 0.88); pelvis.position.y = 0.05; bodyGrp.add(pelvis);
  const waist  = ell(0.130, 1.25, 1.45, 0.82); waist.position.y  = 0.32; bodyGrp.add(waist);
  const chest  = ell(0.175, 1.55, 1.30, 0.82); chest.position.y  = 0.62; bodyGrp.add(chest);
  const shL    = ell(0.10, 1, 1, 1);           shL.position.set(-0.30, 0.66, 0); bodyGrp.add(shL);
  const shR    = ell(0.10, 1, 1, 1);           shR.position.set( 0.30, 0.66, 0); bodyGrp.add(shR);
  g.add(bodyGrp);

  // ── Fej (kicsi, sima, arctalan ovoid) ──
  const headGrp = new THREE.Group();
  headGrp.position.y = 1.92;
  const neck = tcyl(0.058, 0.075, 0.20); neck.position.y = 0.0; headGrp.add(neck);
  const head = ell(0.15, 0.92, 1.34, 1.05); head.position.set(0, 0.26, 0.045); headGrp.add(head); // kissé előrenyúló
  // üres sötét szemgödrök
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 10, 8), dark);
  eyeL.position.set(-0.062, 0.30, 0.15); eyeL.scale.set(1, 1.5, 0.7); headGrp.add(eyeL);
  const eyeR = eyeL.clone(); eyeR.position.x = 0.062; headGrp.add(eyeR);
  // sötét, kissé tátott száj
  const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.055, 10, 8), dark);
  mouth.position.set(0, 0.12, 0.15); mouth.scale.set(1.0, 1.9, 0.55); headGrp.add(mouth);
  g.add(headGrp);

  // ── Karok (NAGYON hosszú, vékony — combközépig lógnak) ──
  function makeArm(side) {
    const arm = new THREE.Group();
    arm.position.set(side * 0.30, 1.78, 0);
    const upper = tcyl(0.060, 0.048, 0.68); upper.position.y = -0.34; arm.add(upper);
    const fore  = tcyl(0.048, 0.038, 0.66); fore.position.y  = -1.00; arm.add(fore);
    const palm  = ell(0.055, 1.0, 0.9, 0.55); palm.position.y = -1.36; arm.add(palm);
    // hosszú karom-ujjak
    for (let f = 0; f < 4; f++) {
      const claw = cone(0.016, 0.17);
      claw.position.set((f - 1.5) * 0.032, -1.50, 0.015);
      claw.rotation.x = Math.PI;                 // hegye lefelé
      claw.rotation.z = (f - 1.5) * 0.12;        // kissé szétterülve
      arm.add(claw);
    }
    return arm;
  }
  const leftArmGrp  = makeArm(-1); g.add(leftArmGrp);
  const rightArmGrp = makeArm( 1); g.add(rightArmGrp);

  // ── Lábak (hosszú, vékony) ──
  const legsGrp = new THREE.Group();
  legsGrp.position.y = 1.12;
  function makeLeg(side) {
    const leg = new THREE.Group();
    leg.position.set(side * 0.12, 0, 0);
    const thigh = tcyl(0.082, 0.062, 0.60); thigh.position.y = -0.31; leg.add(thigh);
    const shin  = tcyl(0.058, 0.042, 0.60); shin.position.y  = -0.92; leg.add(shin);
    const foot  = ell(0.068, 0.9, 0.55, 1.95); foot.position.set(0, -1.22, 0.07); leg.add(foot);
    return leg;
  }
  legsGrp.add(makeLeg(-1)); legsGrp.add(makeLeg(1));
  g.add(legsGrp);

  const offset = Math.random() * Math.PI * 2;
  g.userData.anim = { headGrp, leftArmGrp, rightArmGrp, bodyGrp, legsGrp, offset };
  g.scale.setScalar(1.12);

  return g;
}

const monsters = [];
const RESPAWN_DIST = 60; // world unit — ennél messzebb respawnol
let respawnCooldown = 0;

function spawnOneMonster(cx, cz, chasing = false) {
  // ne oszlopra spawnoljon (beleakadna) — keress szomszédos szabad cellát
  if (columnCells.has(cx + ',' + cz)) {
    const nb = [[cx+1,cz],[cx-1,cz],[cx,cz+1],[cx,cz-1],[cx+1,cz+1],[cx-1,cz-1],[cx+1,cz-1],[cx-1,cz+1]];
    for (const [nx, nz] of nb) {
      if (maze._get(nx, nz) && !columnCells.has(nx + ',' + nz)) { cx = nx; cz = nz; break; }
    }
  }
  const mesh = (LEVELS[currentLevel].monster === 'humanoid') ? createHumanoid() : createBacteria();
  mesh.position.set(cx * CELL, 0, cz * CELL);
  scene.add(mesh);
  monsters.push({ mesh, cx, cz, tx: cx, tz: cz, speed: 0.8, waitT: 0, chasing });
}

function spawnMonsters() {
  const rooms = maze.rooms;
  if (!rooms || rooms.length < 2) return;
  const far = rooms.filter(r => Math.abs(r.cx) + Math.abs(r.cz) > 8);
  const rm = far[Math.floor(Math.random() * far.length)] || rooms[1];
  spawnOneMonster(rm.cx, rm.cz, false);
  respawnCooldown = 15.0; // játék indítása után 15mp-ig ne találkozz a szörnnyel
}

function checkRespawn(dt) {
  respawnCooldown -= dt;
  if (respawnCooldown > 0) return;
  if (monsters.length === 0) return;

  const m = monsters[0];
  const dx = m.mesh.position.x - camera.position.x;
  const dz = m.mesh.position.z - camera.position.z;
  if (dx*dx + dz*dz < RESPAWN_DIST * RESPAWN_DIST) return;

  // Cooldown: ne keresse minden frame-ben
  respawnCooldown = 2.0;

  // Szoba 5-9 cellára a játékos előtt
  const rooms = maze.rooms;
  const pcx = Math.round(camera.position.x / CELL);
  const pcz = Math.round(camera.position.z / CELL);
  const fx = -Math.sin(yaw), fz = -Math.cos(yaw);
  let pool = rooms.filter(r => {
    const rdx = r.cx - pcx, rdz = r.cz - pcz;
    const d = Math.sqrt(rdx*rdx + rdz*rdz);
    if (d < 5 || d > 9) return false;
    return (rdx * fx + rdz * fz) > 0; // játékos előtt
  });
  if (pool.length === 0) pool = rooms.filter(r => {
    const rdx = r.cx - pcx, rdz = r.cz - pcz;
    const d = Math.sqrt(rdx*rdx + rdz*rdz);
    return d >= 5 && d <= 10;
  });
  if (pool.length === 0) return;

  const rm = pool[(Math.random() * pool.length) | 0];
  scene.remove(m.mesh);
  monsters.splice(0, 1);
  spawnOneMonster(rm.cx, rm.cz, true); // azonnal üldöz
}

const DETECT_DIST = 27; // ennyi world unit-on belül meglát
const CHASE_SPEED = 7.15;
const WANDER_SPEED = 1.17;
const GIVE_UP_TIME = 4.5; // ennyi mp-ig keresi az eltűnt játékost, aztán feladja

// ── BFS útkeresés a labirintus celláin keresztül ──
// Visszaad egy [[x,z], ...] cella-listát a startból a célba (start nélkül),
// vagy null-t ha nincs út. A nyílásokon (fal nélkül) halad át.
function findPath(sx, sz, tx, tz, maxNodes = 1200) {
  if (sx === tx && sz === tz) return [];
  const key  = (x, z) => x + ',' + z;
  const seen = new Set([key(sx, sz)]);
  const prev = new Map();
  const queue = [[sx, sz]];
  let qi = 0, found = false;
  while (qi < queue.length && qi < maxNodes) {
    const [cx, cz] = queue[qi++];
    if (cx === tx && cz === tz) { found = true; break; }
    const w = maze.walls(cx, cz);
    const nbrs = [];
    if (!w.n) nbrs.push([cx, cz - 1]);
    if (!w.s) nbrs.push([cx, cz + 1]);
    if (!w.e) nbrs.push([cx + 1, cz]);
    if (!w.w) nbrs.push([cx - 1, cz]);
    for (const [nx, nz] of nbrs) {
      const k = key(nx, nz);
      if (seen.has(k) || !maze._get(nx, nz)) continue;
      // oszlopos cellát kerüld (kivéve ha az a cél) — különben a középre tartva beleakad
      if (columnCells.has(k) && !(nx === tx && nz === tz)) continue;
      seen.add(k);
      prev.set(k, [cx, cz]);
      queue.push([nx, nz]);
    }
  }
  if (!found) return null;
  const path = [];
  let cur = [tx, tz];
  while (!(cur[0] === sx && cur[1] === sz)) {
    path.push(cur);
    const p = prev.get(key(cur[0], cur[1]));
    if (!p) break;
    cur = p;
  }
  path.reverse();
  return path;
}

function updateMonsters(dt) {
  for (const m of monsters) {
    const pdx = camera.position.x - m.mesh.position.x;
    const pdz = camera.position.z - m.mesh.position.z;
    const playerDist = Math.sqrt(pdx*pdx + pdz*pdz);

    // Van-e tiszta rálátás a játékosra?
    const los = playerDist < DETECT_DIST * 2 &&
      hasLineOfSight(m.mesh.position.x, m.mesh.position.z, camera.position.x, camera.position.z);

    // Üldözés indítása: csak ha LÁTJA a játékost a detektálási távon belül
    if (los && playerDist < DETECT_DIST) m.chasing = true;

    if (m.chasing) {
      // Ha valahogy rálátás nélkül indult üldözés (respawn/camp), inicializáljuk
      if (m.lastSeenX === undefined) {
        m.lastSeenX = camera.position.x;
        m.lastSeenZ = camera.position.z;
      }
      if (los) {
        // Látja → frissíti az utolsó ismert pozíciót, nullázza a felejtést
        m.lostTimer = 0;
        m.lastSeenX = camera.position.x;
        m.lastSeenZ = camera.position.z;
      } else {
        // Nem látja → felejtő időzítő ketyeg
        m.lostTimer = (m.lostTimer || 0) + dt;
        if (m.lostTimer > GIVE_UP_TIME) {
          m.chasing = false;   // feladja, bolyongani kezd
          m.path = null;
        }
      }
    }

    // Chase sting: amikor most kezd üldözni (false→true átmenet) + néha közben
    if (m.chasing && !m._wasChasing && window.playChaseSting) {
      window.playChaseSting();
      m.stingTimer = 5 + Math.random() * 5; // következő 5-10mp múlva
    } else if (m.chasing && window.playChaseSting) {
      m.stingTimer = (m.stingTimer || 6) - dt;
      if (m.stingTimer <= 0) {
        window.playChaseSting();
        m.stingTimer = 5 + Math.random() * 5;
      }
    }
    m._wasChasing = m.chasing;

    // Testrész animáció
    const a = m.mesh.userData.anim;
    if (a) {
      const t = performance.now() * 0.001 + a.offset;
      if (m.chasing) {
        // ── Üldözés: rángatózó, felnyúló karok ──
        // Irregulárisan rángatózó függvény
        const jL = Math.sign(Math.sin(t * 6.3)) * Math.abs(Math.sin(t * 4.1));
        const jR = Math.sign(Math.sin(t * 5.7 + 1.2)) * Math.abs(Math.sin(t * 3.8 + 0.9));
        // Karok előre-felfelé nyúlnak (~75°) és rángatóznak
        a.leftArmGrp.rotation.x  = -1.30 + jL * 0.40;
        a.rightArmGrp.rotation.x = -1.30 + jR * 0.40;
        a.leftArmGrp.rotation.z  =  0.30 + Math.abs(Math.sin(t * 4.5)) * 0.25;
        a.rightArmGrp.rotation.z = -0.30 - Math.abs(Math.sin(t * 4.5 + 0.7)) * 0.25;
        a.leftArmGrp.rotation.y  =  jL * 0.22;
        a.rightArmGrp.rotation.y =  jR * 0.22;
        // Fej — erősen rángatózik
        a.headGrp.rotation.x = Math.sin(t * 7.0) * 0.28;
        a.headGrp.rotation.z = jL * 0.22;
        a.headGrp.rotation.y = Math.sin(t * 5.5 + 0.8) * 0.30;
        // Test és lábak — gyors kapálózás
        a.bodyGrp.rotation.y = Math.sin(t * 5.0) * 0.22;
        a.bodyGrp.rotation.x = jR * 0.12;
        a.legsGrp.rotation.x = Math.sin(t * 7.5) * 0.20;
        a.legsGrp.rotation.z = Math.sin(t * 7.5 + Math.PI/2) * 0.10;
      } else {
        // ── Barangolás: lassú, lebegő ──
        a.headGrp.rotation.x = Math.sin(t * 1.4) * 0.18;
        a.headGrp.rotation.z = Math.sin(t * 1.1 + 1) * 0.14;
        a.headGrp.rotation.y = Math.sin(t * 0.8) * 0.20;
        a.leftArmGrp.rotation.z  =  Math.sin(t * 0.9) * 0.10;
        a.rightArmGrp.rotation.z = -Math.sin(t * 0.9) * 0.10;
        a.leftArmGrp.rotation.x  =  Math.sin(t * 0.6 + 0.5) * 0.07;
        a.rightArmGrp.rotation.x =  Math.sin(t * 0.6 - 0.5) * 0.07;
        a.bodyGrp.rotation.y = Math.sin(t * 1.2) * 0.15;
        a.bodyGrp.rotation.x = Math.sin(t * 0.7 + 2) * 0.06;
        a.legsGrp.rotation.x = Math.sin(t * 1.8) * 0.12;
        a.legsGrp.rotation.z = Math.sin(t * 1.8 + Math.PI/2) * 0.06;
      }
    }

    if (m.chasing) {
      if (playerDist < 0.1) continue;
      const mx = m.mesh.position.x, mz = m.mesh.position.z;
      const step = CHASE_SPEED * dt;

      // Ha a közelmúltban beragadt, kényszerített útkeresés akkor is, ha lát
      m.forcePathT = (m.forcePathT || 0) - dt;
      const usePath = !los || m.forcePathT > 0;

      // Cél: ha látja → a játékos; ha nem → az utolsó ismert pozíció
      const tgtX = los ? camera.position.x : m.lastSeenX;
      const tgtZ = los ? camera.position.z : m.lastSeenZ;

      let dirX, dirZ;
      if (!usePath) {
        // Tiszta rálátás → egyenesen rárohan
        dirX = pdx / playerDist;
        dirZ = pdz / playerDist;
        m.path = null;
      } else {
        // BFS a cél felé (látott játékos vagy utolsó ismert pozíció)
        const tdx = tgtX - mx, tdz = tgtZ - mz;
        const tdist = Math.sqrt(tdx*tdx + tdz*tdz);
        // Ha elérte az utolsó ismert helyet és még mindig nem lát → feladja
        // (csak ha tényleg nem látja; kényszerített útkeresésnél nem)
        if (!los && tdist < 1.5) { m.chasing = false; m.path = null; continue; }

        const mcx = Math.round(mx / CELL), mcz = Math.round(mz / CELL);
        const pcx = Math.round(tgtX / CELL);
        const pcz = Math.round(tgtZ / CELL);

        m.pathTimer = (m.pathTimer || 0) - dt;
        if (!m.path || m.path.length === 0 || m.pathTimer <= 0 ||
            m.pathTargetCx !== pcx || m.pathTargetCz !== pcz) {
          m.path = findPath(mcx, mcz, pcx, pcz);
          m.pathTargetCx = pcx; m.pathTargetCz = pcz;
          m.pathTimer = 0.35;
        }

        if (m.path && m.path.length) {
          let wp = m.path[0];
          let wdx = wp[0] * CELL - mx, wdz = wp[1] * CELL - mz;
          let wd  = Math.sqrt(wdx*wdx + wdz*wdz);
          if (wd < 0.7 && m.path.length > 1) {
            m.path.shift();
            wp = m.path[0];
            wdx = wp[0] * CELL - mx; wdz = wp[1] * CELL - mz;
            wd  = Math.sqrt(wdx*wdx + wdz*wdz);
          }
          wd = wd || 1;
          dirX = wdx / wd;
          dirZ = wdz / wd;
        } else {
          dirX = tdx / (tdist || 1);
          dirZ = tdz / (tdist || 1);
        }
      }

      const nx = mx + dirX * step, nz = mz + dirZ * step;
      const moveX = canMove(nx, mz, 1.1);
      const moveZ = canMove(mx, nz, 1.1);
      if (moveX) m.mesh.position.x = nx;
      if (moveZ) m.mesh.position.z = nz;

      // Beragadás-érzékelés: ha próbál mozogni de alig halad, kényszerített útkeresés
      const moved = Math.hypot(m.mesh.position.x - mx, m.mesh.position.z - mz);
      if (step > 0.0001 && moved < step * 0.35) {
        m.stuckT = (m.stuckT || 0) + dt;
        if (m.stuckT > 0.2) { m.forcePathT = 1.5; m.stuckT = 0; m.path = null; m.pathTimer = 0; }
      } else {
        m.stuckT = 0;
      }

      m.mesh.rotation.y = Math.atan2(dirX, dirZ);
      m.mesh.position.y = floorHeightAt(Math.round(m.mesh.position.x / CELL), Math.round(m.mesh.position.z / CELL))
                        + Math.abs(Math.sin(performance.now() * 0.012)) * 0.12;
    } else {
      // Bolyongás
      if (m.waitT > 0) { m.waitT -= dt; continue; }

      const wx = m.tx * CELL, wz = m.tz * CELL;
      const dx = wx - m.mesh.position.x;
      const dz = wz - m.mesh.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);

      if (dist < 0.15) {
        m.cx = m.tx; m.cz = m.tz;
        const w = maze.walls(m.cx, m.cz);
        const opts = [];
        if (!w.n) opts.push([m.cx,   m.cz-1]);
        if (!w.s) opts.push([m.cx,   m.cz+1]);
        if (!w.e) opts.push([m.cx+1, m.cz  ]);
        if (!w.w) opts.push([m.cx-1, m.cz  ]);
        if (opts.length) {
          const pick = opts[Math.floor(Math.random() * opts.length)];
          m.tx = pick[0]; m.tz = pick[1];
        }
        m.waitT = 0.5 + Math.random() * 2.0;
      } else {
        const spd = WANDER_SPEED * dt / dist;
        m.mesh.position.x += dx * spd;
        m.mesh.position.z += dz * spd;
        m.mesh.rotation.y = Math.atan2(dx, dz);
        m.mesh.position.y = floorHeightAt(Math.round(m.mesh.position.x / CELL), Math.round(m.mesh.position.z / CELL))
                          + Math.abs(Math.sin(performance.now() * 0.004)) * 0.05;
      }
    }
  }
}

function updateMonsterAnims() {
  for (const m of monsters) {
    const a = m.mesh.userData.anim;
    if (!a) continue;
    const t = performance.now() * 0.001 + a.offset;
    const jL = Math.sign(Math.sin(t * 6.3)) * Math.abs(Math.sin(t * 4.1));
    const jR = Math.sign(Math.sin(t * 5.7 + 1.2)) * Math.abs(Math.sin(t * 3.8 + 0.9));
    a.leftArmGrp.rotation.x  = -1.30 + jL * 0.40;
    a.rightArmGrp.rotation.x = -1.30 + jR * 0.40;
    a.leftArmGrp.rotation.z  =  0.30 + Math.abs(Math.sin(t * 4.5)) * 0.25;
    a.rightArmGrp.rotation.z = -0.30 - Math.abs(Math.sin(t * 4.5 + 0.7)) * 0.25;
    a.leftArmGrp.rotation.y  =  jL * 0.22;
    a.rightArmGrp.rotation.y =  jR * 0.22;
    a.headGrp.rotation.x = Math.sin(t * 7.0) * 0.28;
    a.headGrp.rotation.z = jL * 0.22;
    a.headGrp.rotation.y = Math.sin(t * 5.5 + 0.8) * 0.30;
    a.bodyGrp.rotation.y = Math.sin(t * 5.0) * 0.22;
    a.bodyGrp.rotation.x = jR * 0.12;
    a.legsGrp.rotation.x = Math.sin(t * 7.5) * 0.20;
    a.legsGrp.rotation.z = Math.sin(t * 7.5 + Math.PI/2) * 0.10;
  }
}

function hasLineOfSight(ax, az, bx, bz) {
  const steps = 12;
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const x = ax + (bx - ax) * t;
    const z = az + (bz - az) * t;
    if (!canMove(x, z)) return false;
  }
  return true;
}

let dead = false;
function checkDeath() {
  if (dead) return;
  for (const m of monsters) {
    const dx = m.mesh.position.x - camera.position.x;
    const dz = m.mesh.position.z - camera.position.z;
    if (dx*dx + dz*dz < 2.8*2.8) {
      if (!hasLineOfSight(m.mesh.position.x, m.mesh.position.z, camera.position.x, camera.position.z)) continue;
      dead = true;
      if (window.playDeathScreech) window.playDeathScreech();
      deathMonsterPos.set(m.mesh.position.x, m.mesh.position.y, m.mesh.position.z);
      deathAnimStart = performance.now();
      if (timerStart !== null) {
        const s = Math.floor((performance.now() - timerStart) / 1000);
        const mm = String(Math.floor(s/60)).padStart(2,'0');
        const ss = String(s % 60).padStart(2,'0');
        const isBest = saveBest(currentLevel, s);
        const prevBest = getBest(currentLevel);
        document.getElementById('survived-time').innerHTML =
          `SURVIVED  ${mm}:${ss}` +
          (isBest ? '<br><span style="font-size:0.8em;opacity:0.8">NEW BEST!</span>'
                  : `<br><span style="font-size:0.8em;opacity:0.6">BEST  ${fmtTime(prevBest)}</span>`);
      }
      document.exitPointerLock();
      return;
    }
  }
}

// ═══════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════
const fwd   = new THREE.Vector3();
const right = new THREE.Vector3();
const SPEED = 4.0;
const SPRINT_SPEED = 7.5;
const CROUCH_SPEED = 2.4;   // guggolva lassabb
const STAND_Y  = 1.72;      // szemmagasság a padló felett állva
const CROUCH_Y = 0.95;      // szemmagasság guggolva (átfér a lógó falak alatt)
let crouchH = STAND_Y;      // simán átmegy a kettő közt
let groundY = 0;            // aktuális padlómagasság (deck/víz) — simán követi
const STAMINA_MAX  = 10.0; // 10mp sprint
const STAMINA_DRAIN = 1.0; // 1mp/mp fogyás sprint közben
const STAMINA_REGEN = 0.25; // 0.25mp/mp töltés → 40mp pihi
let stamina = STAMINA_MAX;
const deathMonsterPos = new THREE.Vector3();
let deathAnimStart = null;
let deathScreenShown = false;
let sprintCooldown = false; // true: kimerült, várni kell
const staminaFill = document.getElementById('stamina-fill');
const timerEl = document.getElementById('timer');
let timerStart = null;

// Anti-camp: ha 30mp alatt nem mozdul 3 egységnél többet, spawnol rá egy szörny
const CAMP_TIME = 30.0;
const CAMP_DIST = 8.0;
let campCheckPos = null;
let campTimer = 0;

function checkCamping(dt) {
  if (!campCheckPos) {
    campCheckPos = { x: camera.position.x, z: camera.position.z };
    return;
  }
  const dx = camera.position.x - campCheckPos.x;
  const dz = camera.position.z - campCheckPos.z;
  if (Math.sqrt(dx*dx + dz*dz) > CAMP_DIST) {
    // eleget mozgott, reset
    campTimer = 0;
    campCheckPos = { x: camera.position.x, z: camera.position.z };
    return;
  }
  campTimer += dt;
  if (campTimer >= CAMP_TIME) {
    campTimer = 0;
    campCheckPos = { x: camera.position.x, z: camera.position.z };
    // Játékos pozíciójára teleportál (garantáltan valid)
    const backX = camera.position.x;
    const backZ = camera.position.z;
    if (monsters.length > 0) {
      const m = monsters[0];
      m.mesh.position.set(backX, 0, backZ);
      m.cx = Math.round(backX / CELL);
      m.cz = Math.round(backZ / CELL);
      m.tx = m.cx; m.tz = m.cz;
      m.chasing = true;
    } else {
      spawnOneMonster(Math.round(backX / CELL), Math.round(backZ / CELL), true);
    }
  }
}
let prev = 0, bobT = 0;

function loop() {
  requestAnimationFrame(loop);
  if (!started || paused) return;

  const now = performance.now();
  const dt  = Math.min((now - prev) / 1000, 0.05);
  prev = now;

  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  fwd.set(-Math.sin(yaw), 0, -Math.cos(yaw));
  right.set(Math.cos(yaw), 0, -Math.sin(yaw));

  let mx = 0, mz = 0;
  if (isMobile) {
    mx = fwd.x * (-touchMove.z) + right.x * touchMove.x;
    mz = fwd.z * (-touchMove.z) + right.z * touchMove.x;
  } else {
    if (keys['KeyW'] || keys['ArrowUp'])    { mx += fwd.x;   mz += fwd.z;   }
    if (keys['KeyS'] || keys['ArrowDown'])  { mx -= fwd.x;   mz -= fwd.z;   }
    if (keys['KeyA'] || keys['ArrowLeft'])  { mx -= right.x; mz -= right.z; }
    if (keys['KeyD'] || keys['ArrowRight']) { mx += right.x; mz += right.z; }
  }

  const len = Math.sqrt(mx * mx + mz * mz);
  const moving = len > 0.001;
  const wantCrouch = isMobile ? touchCrouch : keys['KeyC'];
  let crouching = wantCrouch && !dead;
  // Ne lehessen felállni, ha épp egy lógó fal alatt vagy (belelógnál) — maradj
  // guggolva, amíg ki nem lépsz alóla. (Állva nem fér el, guggolva igen.)
  if (!crouching && !dead &&
      !canMove(camera.position.x, camera.position.z, COL_M, false) &&
       canMove(camera.position.x, camera.position.z, COL_M, true)) {
    crouching = true;
  }
  const wantSprint = isMobile ? touchSprint : keys['ShiftLeft'];
  const sprinting = moving && wantSprint && stamina > 0 && !crouching; // guggolva nincs sprint
  if (sprinting) {
    stamina = Math.max(0, stamina - STAMINA_DRAIN * dt);
  } else {
    stamina = Math.min(STAMINA_MAX, stamina + STAMINA_REGEN * dt);
  }
  // Stamina sáv — piros ha 30% alatt, egyébként arany
  const pct = stamina / STAMINA_MAX;
  staminaFill.style.width = (pct * 100) + '%';
  staminaFill.style.background = pct < 0.30
    ? `rgba(160,60,40,${0.5 + Math.sin(now * 0.005) * 0.25})`
    : `rgba(200,168,50,${0.45 + pct * 0.45})`;
  if (moving && !dead) {
    // vízben lassabb gázolás — csak ha tényleg elöntött cellában vagyunk
    const inWater = WATER_Y > 0 && zoneWater(Math.round(camera.position.x / CELL), Math.round(camera.position.z / CELL));
    const waterFactor = inWater ? 0.82 : 1.0;
    const spd = (crouching ? CROUCH_SPEED : (sprinting ? SPRINT_SPEED : SPEED)) * waterFactor * dt / len;
    const nx = camera.position.x + mx * spd;
    const nz = camera.position.z + mz * spd;
    // guggolva át lehet bújni a lógó falak alatt (ducking=true)
    if (canMove(nx, camera.position.z, COL_M, crouching)) camera.position.x = nx;
    if (canMove(camera.position.x, nz, COL_M, crouching)) camera.position.z = nz;
    bobT += dt * (sprinting ? 9.0 : 5.5);
  }

  // kamera magasság: padlószint (deck/víz) + szemmagasság + fejmozgás, simán
  const targetY = crouching ? CROUCH_Y : STAND_Y;
  crouchH += (targetY - crouchH) * Math.min(1, dt * 10);
  const floorY = floorHeightAt(Math.round(camera.position.x / CELL), Math.round(camera.position.z / CELL));
  groundY += (floorY - groundY) * Math.min(1, dt * 8);
  camera.position.y = groundY + crouchH + (moving ? Math.sin(bobT) * (sprinting ? 0.07 : 0.042) : 0);

  updateLights(now);
  updateFlicker(now);
  if (!dead) { updateMonsters(dt); checkDeath(); checkRespawn(dt); checkCamping(dt); if (!dead) checkDeath(); }
  else { updateMonsterAnims(); }

  if (dead && deathAnimStart !== null) {
    const ANIM_DUR = 1200; // ms
    const t = Math.min((now - deathAnimStart) / ANIM_DUR, 1.0);
    const ease = 1 - Math.pow(1 - t, 3);

    // yaw towards monster
    const tdx = deathMonsterPos.x - camera.position.x;
    const tdz = deathMonsterPos.z - camera.position.z;
    const targetYaw = Math.atan2(-tdx, -tdz);
    let dyaw = targetYaw - yaw;
    // shortest arc
    while (dyaw >  Math.PI) dyaw -= Math.PI * 2;
    while (dyaw < -Math.PI) dyaw += Math.PI * 2;
    yaw += dyaw * ease * 0.12;

    // pitch down slightly (collapse)
    pitch = pitch + (-0.35 - pitch) * ease * 0.08;

    // camera drops
    camera.position.y = Math.max(0.3, camera.position.y - dt * 1.4 * ease);

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // screen shake/jitter until animation completes
    if (t < 1.0) {
      const shakeAmt = 0.18 * (1 - t * 0.2);
      camera.position.x += (Math.random() - 0.5) * shakeAmt * 2;
      camera.position.y += (Math.random() - 0.5) * shakeAmt;
      camera.position.z += (Math.random() - 0.5) * shakeAmt * 2;
    }

    if (t >= 1.0 && !deathScreenShown) {
      deathScreenShown = true;
      document.getElementById('dead').className = 'show';
    }
  }

  if (timerStart !== null) {
    const s = Math.floor((performance.now() - timerStart) / 1000);
    timerEl.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }
  renderer.render(scene, camera);
  if (vhsEnabled) drawCRT(now);
  else crtCtx.clearRect(0, 0, crtCanvas.width, crtCanvas.height);
}

// ═══════════════════════════════════════════════
//  CRT / VHS EFFECT
// ═══════════════════════════════════════════════
const glCanvas  = renderer.domElement; // hidden webgl canvas

// Resize CRT canvas to match window
function resizeCRT() {
  crtCanvas.width  = window.innerWidth;
  crtCanvas.height = window.innerHeight;
}
resizeCRT();
window.addEventListener('resize', resizeCRT);

let flickerVal = 1.0;

// — Előre renderelt grain-csempék (teljesítmény) —
const GRAIN_TILES = [];
const GT_SIZE = 256;
for (let t = 0; t < 8; t++) {
  const c = document.createElement('canvas');
  c.width = GT_SIZE; c.height = GT_SIZE;
  const cx = c.getContext('2d');
  const img = cx.createImageData(GT_SIZE, GT_SIZE);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = Math.random();
    if (r < 0.62) { d[i+3] = 0; continue; }       // ritka: átlátszó
    if (r < 0.82) {                                // világos szemcse
      d[i] = 255; d[i+1] = 240; d[i+2] = 160; d[i+3] = (Math.random()*70 + 20) | 0;
    } else if (r < 0.93) {                         // sötét szemcse
      d[i] = 0; d[i+1] = 0; d[i+2] = 0; d[i+3] = (Math.random()*60 + 20) | 0;
    } else {                                       // chroma-zaj
      d[i] = (Math.random()*255)|0; d[i+1] = (Math.random()*255)|0; d[i+2] = (Math.random()*255)|0;
      d[i+3] = (Math.random()*40 + 12) | 0;
    }
  }
  cx.putImageData(img, 0, 0);
  GRAIN_TILES.push(crtCtx.createPattern(c, 'repeat'));
}

function drawCRT(now) {
  const W = crtCanvas.width, H = crtCanvas.height;
  const ctx = crtCtx;
  ctx.clearRect(0, 0, W, H);

  // — screen flicker —
  flickerVal += (Math.random() - 0.5) * 0.04;
  flickerVal = Math.max(0.88, Math.min(1.0, flickerVal));
  const bright = flickerVal;

  // — screen flicker: subtle brightness dip via dark overlay —
  if (flickerVal < 0.97) {
    ctx.fillStyle = `rgba(0,0,0,${(1 - flickerVal) * 0.5})`;
    ctx.fillRect(0, 0, W, H);
  }

  // — scanlines —
  ctx.globalCompositeOperation = 'multiply';
  for (let y = 0; y < H; y += 3) {
    const alpha = (y % 6 === 0) ? 0.78 : 1.0;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, y, W, 1);
  }
  ctx.globalCompositeOperation = 'source-over';

  // — phosphor amber tint overlay —
  ctx.fillStyle = 'rgba(20,10,0,0.10)';
  ctx.fillRect(0, 0, W, H);

  // — VHS roll line —
  const rollY = (now * 0.025) % H;
  const rg = ctx.createLinearGradient(0, rollY - 24, 0, rollY + 24);
  rg.addColorStop(0,   'rgba(255,240,160,0)');
  rg.addColorStop(0.5, 'rgba(255,240,160,0.055)');
  rg.addColorStop(1,   'rgba(255,240,160,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(0, rollY - 24, W, 48);

  // — vignette —
  const vg = ctx.createRadialGradient(W/2, H/2, H * 0.32, W/2, H/2, H * 0.88);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.42)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // — film grain (előre renderelt csempe, mozgó eltolással) —
  const pat = GRAIN_TILES[((now * 0.06) | 0) % GRAIN_TILES.length];
  if (pat) {
    const ox = (Math.random() * GT_SIZE) | 0;
    const oy = (Math.random() * GT_SIZE) | 0;
    ctx.save();
    ctx.translate(-ox, -oy);
    ctx.fillStyle = pat;
    ctx.fillRect(ox, oy, W, H);
    ctx.restore();
  }

  // — folyamatos finom vízszintes tracking sávok alul —
  const trackBase = H * 0.82;
  for (let i = 0; i < 8; i++) {
    const ty = trackBase + Math.random() * (H * 0.18);
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.06})`;
    ctx.fillRect(0, ty | 0, W, 1);
  }

  // — gyakori vízszintes sync glitch (színes tear) —
  if (Math.random() < 0.06) {
    const gy = (Math.random() * H) | 0;
    const gh = (Math.random() * 6 + 2) | 0;
    // RGB szétcsúszás imitáció: piros + cián sáv
    ctx.fillStyle = `rgba(255,40,40,${Math.random() * 0.12 + 0.05})`;
    ctx.fillRect(0, gy, W, gh);
    ctx.fillStyle = `rgba(40,255,255,${Math.random() * 0.10 + 0.04})`;
    ctx.fillRect(0, gy + gh, W, gh);
    // fehér kiégés
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.10})`;
    ctx.fillRect(0, gy, W, 1);
  }

  // — ritka erős glitch-burst: több eltolt blokk —
  if (Math.random() < 0.012) {
    const blocks = (Math.random() * 5 + 3) | 0;
    for (let i = 0; i < blocks; i++) {
      const by = (Math.random() * H) | 0;
      const bh = (Math.random() * 22 + 4) | 0;
      const bx = (Math.random() * W * 0.4) | 0;
      const bw = (Math.random() * W * 0.6 + W * 0.2) | 0;
      ctx.fillStyle = `rgba(${(Math.random()*255)|0},${(Math.random()*255)|0},${(Math.random()*255)|0},${Math.random() * 0.20 + 0.06})`;
      ctx.fillRect(bx, by, bw, bh);
    }
    // teljes képernyős villanás
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.08})`;
    ctx.fillRect(0, 0, W, H);
  }
}
